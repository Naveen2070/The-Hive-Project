events {
    worker_connections 2048;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # -----------------------------
    # Performance
    # -----------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # -----------------------------
    # Gzip Compression
    # -----------------------------
    gzip on;
    gzip_min_length 1000;
    gzip_types
    text/plain
    text/css
    application/json
    application/javascript
    text/xml
    application/xml
    application/xml+rss
    text/javascript;

    # -----------------------------
    # Proxy Timeouts
    # -----------------------------
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # -----------------------------
    # Rate Limiting (DDoS Protection)
    # -----------------------------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # -----------------------------
    # API Cache
    # -----------------------------
    proxy_cache_path /var/cache/nginx
    levels=1:2
    keys_zone=api_cache:100m
    max_size=1g
    inactive=60m
    use_temp_path=off;

    # -----------------------------
    # Upstream Services
    # -----------------------------

    upstream frontend {
        server frontend:80;
    }

    upstream identity-service {
        server identity-service:8081;
    }

    upstream movie-service {
        server movie-service:8080;
    }

    upstream core-api {
        server core-api:8080;
    }

    upstream hive-admin-ui {
        server hive-admin-ui:80;
    }

    # -----------------------------
    # Main Server
    # -----------------------------

    server {
        listen 80;
        server_name _;

        # Common proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Connection protection
        limit_conn conn_limit 20;

        # -----------------------------
        # Health Check Endpoint
        # -----------------------------
        location /health {
            access_log off;
            return 200 "healthy\n";
        }

        # -----------------------------
        # Identity Service
        # -----------------------------
        location ~ ^/api/(auth|users|admin)(/|$) {

            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://identity-service;

            proxy_buffering off;
        }

        # -----------------------------
        # Movie Service
        # -----------------------------
        location ~ ^/api/(movies|cinemas|auditoriums|showtimes|tickets)(/|$) {

            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://movie-service;

            proxy_buffering off;

            # Cache GET responses
            proxy_cache api_cache;
            proxy_cache_methods GET;
            proxy_cache_valid 200 1m;
            proxy_cache_valid 404 30s;

            add_header X-Cache-Status $upstream_cache_status;
        }

        # -----------------------------
        # Core Event Service
        # -----------------------------
        location ~ ^/api/(events|bookings|tiers|dashboard)(/|$) {

            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://core-api;

            proxy_buffering off;
        }

        # -----------------------------
        # Admin UI
        # -----------------------------
        location /admin/ {
            proxy_pass http://hive-admin-ui/;
        }

        # -----------------------------
        # Frontend (React)
        # -----------------------------
        location / {

            proxy_pass http://frontend;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}